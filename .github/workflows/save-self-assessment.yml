name: Save self assessment JSON

on:
  workflow_dispatch:
    inputs:
      product_name:
        description: Produktnavn
        required: true
        type: string
      checklist_json:
        description: JSON payload
        required: true
        type: string

permissions:
  contents: write

jobs:
  save-json:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Gem JSON i self assessment mappe
        run: |
          mkdir -p docs/self-assessment
          SAFE_NAME=$(echo "${{ inputs.product_name }}" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9._-]/-/g' | sed 's/-\+/-/g' | sed 's/^-//;s/-$//')
          TS=$(date -u +"%Y%m%dT%H%M%SZ")
          FILE="docs/self-assessment/${SAFE_NAME:-os2-produkt}-${TS}.json"
          cat > "$FILE" << 'EOF'
          ${{ inputs.checklist_json }}
          EOF
          echo "Saved $FILE"

      - name: Generer rapporter
        run: |
          python << 'PYTHON'
          import json
          import html
          from pathlib import Path

          folder = Path("docs/self-assessment")
          json_files = sorted(folder.glob("*.json"))
          latest = json_files[-1]
          data = json.loads(latest.read_text(encoding="utf-8"))

          product = data.get("productName", "Produkt")
          filled_by = data.get("filledBy", "")
          filled_date = data.get("filledDate", "")

          emoji = {
              "Ja": "🟢",
              "Nej": "🔴",
              "Ved ikke": "🔴",
              "Ikke relevant": "⚪",
              "Planlagt": "🟡"
          }

          colors = {
              "Ja": "#198754",
              "Nej": "#dc3545",
              "Ved ikke": "#dc3545",
              "Ikke relevant": "#6c757d",
              "Planlagt": "#ffc107"
          }

          # Markdown
          md = []
          md.append(f"# {product} - Selvevaluering")
          md.append("")
          md.append(f"**Udfyldt af:** {filled_by}")
          md.append("")
          md.append(f"**Dato:** {filled_date}")
          md.append("")
          md.append(f"**Kilde:** `{latest.name}`")
          md.append("")

          for krav in data.get("krav", []):
              status = krav.get("efterlevet", "")
              md.append("---")
              md.append("")
              md.append(f"## {krav.get('id','')} - {krav.get('krav','')}")
              md.append("")
              md.append(f"**Status:** {emoji.get(status, '⚪')} {status}")
              md.append("")
              md.append(f"**Kategori:** {krav.get('kategori','')}")
              md.append("")
              md.append("**Retningslinjer:**")
              md.append("")
              md.append(krav.get("retningslinjer", ""))
              md.append("")
              md.append("**Dokumentation:**")
              md.append("")
              md.append(krav.get("dokumentation", ""))
              md.append("")

          (folder / "latest.md").write_text("\n".join(md), encoding="utf-8")

          # HTML bygges linje for linje for at undgå YAML-indrykningsproblemer
          out = []
          out.append("<!DOCTYPE html>")
          out.append('<html lang="da">')
          out.append("<head>")
          out.append('<meta charset="utf-8">')
          out.append(f"<title>{html.escape(product)} - Selvevaluering</title>")
          out.append("<style>")
          out.append("body{font-family:Arial,Helvetica,sans-serif;max-width:1200px;margin:0 auto;padding:30px;line-height:1.6;}")
          out.append("h1{border-bottom:3px solid #ddd;padding-bottom:10px;}")
          out.append(".meta{background:#f5f5f5;padding:15px;border-radius:8px;}")
          out.append(".toc{background:#fafafa;padding:20px;border:1px solid #ddd;border-radius:8px;}")
          out.append(".toc li{margin-bottom:6px;}")
          out.append(".krav{margin-top:30px;border:1px solid #ddd;border-radius:8px;padding:20px;}")
          out.append(".badge{display:inline-block;color:white;padding:6px 12px;border-radius:5px;font-weight:bold;}")
          out.append(".doc{white-space:pre-wrap;}")
          out.append("</style>")
          out.append("</head>")
          out.append("<body>")
          out.append(f"<h1>{html.escape(product)} - Selvevaluering</h1>")
          out.append('<div class="meta">')
          out.append(f"<strong>Udfyldt af:</strong> {html.escape(filled_by)}<br>")
          out.append(f"<strong>Dato:</strong> {html.escape(filled_date)}<br>")
          out.append(f"<strong>Kilde:</strong> {html.escape(latest.name)}")
          out.append("</div>")
          out.append("<h2>Indholdsfortegnelse</h2>")
          out.append('<ul class="toc">')

          for krav in data.get("krav", []):
              kid = html.escape(krav.get("id", ""))
              title = html.escape(krav.get("krav", ""))
              status = krav.get("efterlevet", "")
              color = colors.get(status, "#6c757d")

              out.append(
                  f'<li>'
                  f'<span class="badge" style="background:{color}">{html.escape(status)}</span> '
                  f'<a href="#{kid}">{kid} - {title}</a>'
                  f'</li>'
              )

          out.append("</ul>")
          
          for krav in data.get("krav", []):
              kid = html.escape(krav.get("id", ""))
              title = html.escape(krav.get("krav", ""))
              status = krav.get("efterlevet", "")
              color = colors.get(status, "#6c757d")

              out.append(f'<div class="krav" id="{kid}">')
              out.append(f"<h2>{kid} - {title}</h2>")
              out.append(f'<p><span class="badge" style="background:{color}">{html.escape(status)}</span></p>')
              out.append(f"<p><strong>Kategori:</strong> {html.escape(krav.get('kategori',''))}</p>")
              out.append("<p><strong>Retningslinjer:</strong></p>")
              out.append(f'<div class="doc">{html.escape(krav.get("retningslinjer",""))}</div>')
              out.append("<p><strong>Dokumentation:</strong></p>")
              out.append(f'<div class="doc">{html.escape(krav.get("dokumentation",""))}</div>')
              out.append("</div>")

          out.append("</body>")
          out.append("</html>")

          (folder / "latest.html").write_text("\n".join(out), encoding="utf-8")
          PYTHON

      - name: Commit og push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/self-assessment/*
          git commit -m "Tilføj self assessment rapport" || echo "Ingen ændringer"
          git push
