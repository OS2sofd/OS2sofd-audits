name: Save self assessment JSON

on:
  workflow_dispatch:
    inputs:
      product_name:
        description: Produktnavn
        required: true
        type: string

      checklist_json:
        description: JSON payload
        required: true
        type: string

permissions:
  contents: write

jobs:
  save-json:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Gem JSON i self assessment mappe
        run: |
          mkdir -p docs/self-assessment

          SAFE_NAME=$(echo "${{ inputs.product_name }}" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9._-]/-/g' | sed 's/-\+/-/g' | sed 's/^-//;s/-$//')

          TS=$(date -u +"%Y%m%dT%H%M%SZ")

          FILE="docs/self-assessment/${SAFE_NAME:-os2-produkt}-${TS}.json"

          cat > "$FILE" << 'EOF'
          ${{ inputs.checklist_json }}
          EOF

          echo "Saved $FILE"

      - name: Generer Markdown rapport
        run: |
          python << 'PYTHON'
          import json
          from pathlib import Path

          json_files = sorted(
              Path("docs/self-assessment").glob("*.json")
          )

          latest = json_files[-1]

          data = json.loads(
              latest.read_text(encoding="utf-8")
          )

          md = []

          md.append(
              f"# {data.get('productName','Produkt')} - Selvevaluering"
          )

          md.append("")
          md.append(f"**Udfyldt af:** {data.get('filledBy','')}")
          md.append("")
          md.append(f"**Dato:** {data.get('filledDate','')}")
          md.append("")
          md.append(f"**Kilde:** `{latest.name}`")
          md.append("")

          emoji = {
              "Ja": "🟢",
              "Nej": "🔴",
              "Ved ikke": "🟡",
              "Ikke relevant": "⚪"
          }

          for krav in data.get("krav", []):

              md.append("---")
              md.append("")

              md.append(
                  f"## {krav.get('id','')} - {krav.get('krav','')}"
              )

              md.append("")

              status = krav.get("efterlevet","")

              md.append(
                  f"**Status:** {emoji.get(status,'⚪')} {status}"
              )

              md.append("")
              md.append(
                  f"**Kategori:** {krav.get('kategori','')}"
              )

              md.append("")
              md.append("**Dokumentation:**")
              md.append("")
              md.append(
                  krav.get("dokumentation","")
              )

              md.append("")

          Path(
              "docs/self-assessment/latest.md"
          ).write_text(
              "\n".join(md),
              encoding="utf-8"
          )

          PYTHON

      - name: Generer HTML rapport
        run: |
          python << 'PYTHON'
          import json
          from pathlib import Path
          import html

          json_files = sorted(
              Path("docs/self-assessment").glob("*.json")
          )

          latest = json_files[-1]

          data = json.loads(
              latest.read_text(encoding="utf-8")
          )

          status_colors = {
              "Ja": "#198754",
              "Nej": "#dc3545",
              "Ved ikke": "#ffc107",
              "Ikke relevant": "#6c757d"
          }

          report = f"""
<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="utf-8">
<title>{html.escape(data['productName'])} - Selvevaluering</title>

<style>

body {{
  font-family: Arial, Helvetica, sans-serif;
  max-width: 1200px;
  margin: 0 auto;
  padding: 30px;
  line-height: 1.6;
}}

h1 {{
  border-bottom: 3px solid #ddd;
  padding-bottom: 10px;
}}

.meta {{
  background: #f5f5f5;
  padding: 15px;
  border-radius: 8px;
}}

.toc {{
  background: #fafafa;
  padding: 20px;
  border: 1px solid #ddd;
  border-radius: 8px;
}}

.toc li {{
  margin-bottom: 6px;
}}

.krav {{
  margin-top: 30px;
  border: 1px solid #ddd;
  border-radius: 8px;
  padding: 20px;
}}

.badge {{
  display: inline-block;
  color: white;
  padding: 6px 12px;
  border-radius: 5px;
  font-weight: bold;
}}

.doc {{
  white-space: pre-wrap;
}}

</style>
</head>
<body>

<h1>{html.escape(data['productName'])} - Selvevaluering</h1>

<div class="meta">
<strong>Udfyldt af:</strong> {html.escape(data.get('filledBy',''))}<br>
<strong>Dato:</strong> {html.escape(data.get('filledDate',''))}<br>
<strong>Kilde:</strong> {html.escape(latest.name)}
</div>

<h2>Indholdsfortegnelse</h2>

<ul class="toc">
"""

          for krav in data.get("krav", []):
              report += (
                  f'<li><a href="#{krav["id"]}">'
                  f'{krav["id"]} - '
                  f'{html.escape(krav["krav"])}</a></li>'
              )

          report += "</ul>"

          for krav in data.get("krav", []):

              status = krav.get("efterlevet", "")
              color = status_colors.get(status, "#6c757d")

              report += f"""
<div class="krav" id="{krav['id']}">

<h2>{krav['id']} - {html.escape(krav['krav'])}</h2>

<p>
<span class="badge" style="background:{color}">
{html.escape(status)}
</span>
</p>

<p>
<strong>Kategori:</strong>
{html.escape(krav.get('kategori',''))}
</p>

<p>
<strong>Retningslinjer:</strong>
</p>

<div class="doc">
{html.escape(krav.get('retningslinjer',''))}
</div>

<p>
<strong>Dokumentation:</strong>
</p>

<div class="doc">
{html.escape(krav.get('dokumentation',''))}
</div>

</div>
"""

          report += """
</body>
</html>
"""

          Path(
              "docs/self-assessment/latest.html"
          ).write_text(
              report,
              encoding="utf-8"
          )

          PYTHON

      - name: Commit og push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add docs/self-assessment/*

          git commit -m "Tilføj self assessment rapport" || echo "Ingen ændringer"

          git push
